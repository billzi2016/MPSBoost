site_name: MPSBoost
site_description: Bilingual documentation for MPSBoost
site_url: https://billzi2016.github.io/MPSBoost/
repo_url: https://github.com/billzi2016/MPSBoost
repo_name: billzi2016/MPSBoost
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          build: true
          default: true
          theme:
            language: en
        - locale: zh-Hans
          name: 简体中文
          build: true
          theme:
            language: zh
  - search:
      lang:
        - en

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

# Folder-mode i18n resolves these paths inside each language directory.
nav:
  - Home: index.md
  - Getting Started:
      - Installation and Environment: getting-started/install.md
      - Quick Start: getting-started/quick-start.md
  - User Guide:
      - Backend Policy: user-guide/backend-policy.md
      - Estimator API: user-guide/estimators.md
      - sklearn Compatibility: user-guide/sklearn-compat.md
      - Objectives: user-guide/objectives.md
      - Explanations: user-guide/explanations.md
      - Model I/O: user-guide/model-io.md
  - Model Families:
      - Gradient Boosting: model-families/gradient-boosting.md
      - Forests and Trees: model-families/forests.md
      - CatBoost-like: model-families/catboost-like.md
      - Anomaly Detection and Ranking: model-families/anomaly-ranking.md
  - Release:
      - Overview: release/index.md
      - 0.4.0: release/0.4.0.md
      - 0.3.0: release/0.3.0.md
      - 0.2.0: release/0.2.0.md
      - 0.2.0rc0: release/0.2.0rc0.md
      - 0.2.0b0: release/0.2.0b0.md
      - 0.2.0a0: release/0.2.0a0.md
      - 0.1.0a0: release/0.1.0a0.md
  - Roadmap:
      - Portable Backends: roadmap/portable-backends.md
      - Translation and Internationalization: roadmap/i18n-translation.md
  - Development:
      - Documentation Site: development/docs-site.md
  - Project:
      - README: project/README.md
      - Contributing: project/CONTRIBUTING.md
      - Changelog: project/CHANGELOG.md
      - Release Audits:
          - 0.4.0: project/RELEASE_AUDIT_0.4.0.md
          - 0.3.0: project/RELEASE_AUDIT_0.3.0.md
          - 0.2.0: project/RELEASE_AUDIT_0.2.0.md
          - 0.2.0rc0: project/RELEASE_AUDIT_0.2.0rc0.md
          - 0.2.0b0: project/RELEASE_AUDIT_0.2.0b0.md
          - 0.2.0a0: project/RELEASE_AUDIT_0.2.0a0.md
          - 0.1.0a0: project/RELEASE_AUDIT_0.1.0a0.md
      - Agent Skill: project/mps_boost_skill.md
      - Icon Assets: assets/icons/README.md
  - Benchmarks:
      - S4 M2 Ultra: benchmarks/results/s4-m2-ultra-py313.md
      - S6 M2 Ultra: benchmarks/results/s6-m2-ultra-py313.md
  - Tests:
      - Real-world Tests: tests/real_world/README.md
      - Real-world Report: tests/real_world/REPORT.md
  - Specs:
      - Specs Index: specs/README.md
      - Tasks: specs/tasks.md
      - Constitution: specs/constitution.md
      - Project Tree: specs/project-tree.md
      - Agent Rules: specs/AGENTS.md
      - Legacy Issues: specs/legacy-issues.md
      - V1 PRD: specs/v1-mps-histogram-engine/prd.md
      - V1 Modules:
          - Python API: specs/v1-mps-histogram-engine/modules/01-python-api.md
          - Data and Quantization: specs/v1-mps-histogram-engine/modules/02-data-quantization.md
          - Training Core: specs/v1-mps-histogram-engine/modules/03-training-core.md
          - MPS Backend: specs/v1-mps-histogram-engine/modules/04-mps-backend.md
          - Cache: specs/v1-mps-histogram-engine/modules/05-cache.md
          - Model I/O: specs/v1-mps-histogram-engine/modules/06-model-io.md
          - Quality: specs/v1-mps-histogram-engine/modules/07-quality.md
          - Packaging Release: specs/v1-mps-histogram-engine/modules/08-packaging-release.md
      - V2 Arboretum: specs/v2-arboretum-implementation/prd.md
