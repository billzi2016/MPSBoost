name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

# wheel 标签和 native deployment target 必须一致，避免在最新 runner 上构建出只能由
# 最新系统安装的包。发布矩阵若提高最低版本，需要先修改规格和兼容性测试。
env:
  MACOSX_DEPLOYMENT_TARGET: "13.0"

jobs:
  test:
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - name: Install build and test tools
        run: python -m pip install build twine pytest numpy
      - name: Build wheel
        run: python -m build --wheel
      - name: Install built wheel
        run: python -m pip install --force-reinstall --no-deps dist/*.whl
      - run: python -m pytest
      - name: Validate wheel metadata
        run: python -m twine check dist/*.whl
      - name: Save validated wheel
        uses: actions/upload-artifact@v4
        with:
          name: mpsboost-wheel-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error
